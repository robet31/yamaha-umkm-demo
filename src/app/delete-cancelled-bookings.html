<!DOCTYPE html>
<html>
<head>
  <title>Hapus Booking yang Dibatalkan</title>
  <script type="module">
    const projectId = 'tvugghippwvoxsjqyxkr';
    const publicAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR2dWdnaGlwcHd2b3hzanF5eGtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Mzc2MTAxNTUsImV4cCI6MjA1MzE4NjE1NX0.JoXX2xKiDshcNMOZdOkb5pJ1VTaEE0BLcV2bEUhNpvQ';
    
    const bookingsToDelete = [
      'JO-1770241745937-XZVS',
      'JO-1770240355440-INZS',
      'JO-1770237352351-N9EM'
    ];
    
    async function deleteBookings() {
      console.log('🗑️ Starting deletion of cancelled bookings...');
      
      for (const jobNumber of bookingsToDelete) {
        try {
          console.log(`📤 Deleting ${jobNumber}...`);
          
          const response = await fetch(
            `https://${projectId}.supabase.co/functions/v1/make-server-c1ef5280/bookings/${jobNumber}`,
            {
              method: 'DELETE',
              headers: {
                'Authorization': `Bearer ${publicAnonKey}`,
                'Content-Type': 'application/json'
              }
            }
          );
          
          if (response.ok) {
            const result = await response.json();
            console.log(`✅ ${jobNumber} deleted:`, result);
            document.getElementById('log').innerHTML += `<div style="color: green;">✅ ${jobNumber} - BERHASIL DIHAPUS</div>`;
          } else {
            const error = await response.json();
            console.error(`❌ ${jobNumber} failed:`, error);
            document.getElementById('log').innerHTML += `<div style="color: red;">❌ ${jobNumber} - GAGAL: ${error.error || 'Unknown error'}</div>`;
          }
        } catch (error) {
          console.error(`❌ Error deleting ${jobNumber}:`, error);
          document.getElementById('log').innerHTML += `<div style="color: red;">❌ ${jobNumber} - ERROR: ${error.message}</div>`;
        }
        
        // Wait 500ms between deletions
        await new Promise(resolve => setTimeout(resolve, 500));
      }
      
      console.log('✅ Deletion complete!');
      document.getElementById('log').innerHTML += `<div style="color: blue; font-weight: bold; margin-top: 20px;">✅ SELESAI! Silakan refresh dashboard Anda.</div>`;
    }
    
    // Auto-run on page load
    window.addEventListener('load', deleteBookings);
  </script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    #log {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
      min-height: 200px;
      font-family: monospace;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 {
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>
  <h1>🗑️ Hapus Booking yang Dibatalkan</h1>
  <p style="text-align: center;">Menghapus 3 booking dari database...</p>
  <div id="log">
    <div style="color: gray;">⏳ Processing...</div>
  </div>
</body>
</html>
